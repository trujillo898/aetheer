# Configuración de fuentes de mercado (D013 — fuente única tv-unified)
# Ver: Essence/06_DECISIONES.txt (D013)

tv_unified:
  description: "Fuente única via TradingView Desktop CDP + APIs públicas TV + cache SQLite"
  cdp:
    port: 9222
    host: "127.0.0.1"
    requires: "TradingView Desktop con --remote-debugging-port=9222"
  cache:
    path: "db/tv_cache.sqlite"
    stale_window_seconds: 1800  # 30 min
    ttls:
      price: 5
      ohlcv: 60
      correlations: 30
      news: 1800
      calendar: 3600
  quality_score: 0.98  # live CDP — decae linealmente con cache age

  symbols:
    dxy: "TVC:DXY"
    eurusd: "OANDA:EURUSD"
    gbpusd: "OANDA:GBPUSD"
    xauusd: "OANDA:XAUUSD"
    vix: "TVC:VIX"
    spx: "SP:SPX"
    us10y: "TVC:US10Y"
    us02y: "TVC:US02Y"
    usoil: "TVC:USOIL"
    de10y: "TVC:DE10Y"
    gb10y: "TVC:GB10Y"
  note: "OANDA: prefix es el exchange dentro de TradingView — no es la API externa de OANDA."

  news_api:
    endpoint: "https://news-headlines.tradingview.com"
    description: "JSON público sin cookies"
  calendar_api:
    endpoint: "https://economic-calendar.tradingview.com"
    description: "JSON público — requiere headers Origin/Referer"

  health:
    monitor_script: "scripts/tv-health-monitor.py"
    env:
      - "AETHEER_AUTORESTART"  # 1 para relanzar TV Desktop si cae
      - "AETHEER_TV_LAUNCH_CMD"  # comando custom de lanzamiento
      - "TV_MONITOR_INTERVAL"  # segundos entre probes

fred:
  # Mantenido en macro-data MCP para datos macro (FedWatch, yields fallback)
  base_url: "https://api.stlouisfed.org/fred/series/observations"
  series:
    us_10y: "DGS10"
    cpi: "CPIAUCSL"
    unemployment: "UNRATE"
    fed_funds: "FEDFUNDS"
